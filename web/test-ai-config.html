<!DOCTYPE html>
<html>
<head>
    <title>测试AI配置加载</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>测试AI配置加载</h1>
    <div id="result"></div>
    
    <script>
        async function testConfigLoad() {
            const resultDiv = document.getElementById('result');
            
            try {
                // 测试配置文件加载
                resultDiv.innerHTML = '<p>正在加载配置文件...</p>';
                
                const response = await fetch('/ai-chat-config.json');
                
                if (!response.ok) {
                    resultDiv.innerHTML += `<p style="color: red;">HTTP错误: ${response.status} ${response.statusText}</p>`;
                    return;
                }
                
                const contentType = response.headers.get('content-type');
                resultDiv.innerHTML += `<p>Content-Type: ${contentType}</p>`;
                
                const text = await response.text();
                resultDiv.innerHTML += `<p>文件大小: ${text.length} 字节</p>`;
                
                try {
                    const config = JSON.parse(text);
                    resultDiv.innerHTML += `<p style="color: green;">✅ 配置文件解析成功！</p>`;
                    resultDiv.innerHTML += `<pre>${JSON.stringify(config, null, 2)}</pre>`;
                    
                    // 测试API端点
                    resultDiv.innerHTML += '<p>测试API端点连接...</p>';
                    
                    const apiTest = await fetch(config.apiEndpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: config.model,
                            messages: [{role: 'user', content: 'test'}],
                            stream: false
                        })
                    });
                    
                    if (apiTest.ok) {
                        resultDiv.innerHTML += `<p style="color: green;">✅ API端点连接成功！</p>`;
                    } else {
                        resultDiv.innerHTML += `<p style="color: orange;">⚠️ API端点连接失败: ${apiTest.status} ${apiTest.statusText}</p>`;
                        const errorText = await apiTest.text();
                        resultDiv.innerHTML += `<pre>${errorText}</pre>`;
                    }
                    
                } catch (parseError) {
                    resultDiv.innerHTML += `<p style="color: red;">❌ JSON解析错误: ${parseError.message}</p>`;
                    resultDiv.innerHTML += `<pre>${text.substring(0, 500)}...</pre>`;
                }
                
            } catch (error) {
                resultDiv.innerHTML += `<p style="color: red;">❌ 加载失败: ${error.message}</p>`;
            }
        }
        
        // 页面加载后自动测试
        window.addEventListener('load', testConfigLoad);
    </script>
</body>
</html>
